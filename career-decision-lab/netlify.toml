[build]
  command = "npm ci && npm run build"
  publish = "out"

[build.environment]
  NODE_ENV = "production"
  DEPLOY_TARGET = "netlify"
  NODE_VERSION = "20"
  NPM_CONFIG_PRODUCTION = "false"

[dev]
  command = "npm run dev"
  port = 3000
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
