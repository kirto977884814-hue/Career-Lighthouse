[build]
  base = "career-decision-lab/"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_ENV = "production"
  DEPLOY_TARGET = "netlify"
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
  command = "npm run dev"
  port = 3000
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
